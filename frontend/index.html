<!DOCTYPE html>
<html lang="ru" class="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta property="og:title" content="Математический джебокс">
    <meta property="og:description" content="Играйте с друзьями, узнайте кто лучший математик #МатематическийДжебокс">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://mathjackbox.night.ru">
    <meta property="og:image" content="https://mathjackbox.night.ru/preview.jpg">

    <title>MATH JACKBOX</title>

    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#2563eb' }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="./style/styles.css">

    <style>
        .in-check {
            background-color: rgba(239, 68, 68, 0.6) !important;
            box-shadow: inset 0 0 15px rgba(239, 68, 68, 0.9) !important;
        }
    </style>
</head>

<body
    class="bg-gray-100 text-gray-900 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-300 min-h-screen flex flex-col font-sans">

    <nav class="relative z-50 bg-white dark:bg-gray-800 shadow-md py-4 transition-colors duration-300">
        <div class="max-w-7xl mx-auto w-full px-4 lg:px-8 flex justify-between items-center">
            <div class="flex items-center gap-4">

                <button onclick="copyTag()"
                    class="text-left group p-2 -ml-2 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700/50 transition-colors duration-200 select-none cursor-pointer"
                    title="Нажмите, чтобы скопировать тег">
                    <h1
                        class="font-bold text-xl tracking-wide group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">
                        MATH JACKBOX</h1>
                    <p id="hashtag-text" class="text-sm gradient-tag tracking-wider transition-all duration-300">
                        #MathJackbox</p>
                </button>
            </div>
            <button id="theme-toggle"
                class="p-2 rounded-lg bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 transition">
                <svg id="theme-icon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z">
                    </path>
                </svg>
            </button>
        </div>
    </nav>

    <div id="game-overlay"
        class="fixed inset-0 z-40 bg-white/60 dark:bg-gray-900/70 backdrop-blur-xl flex flex-col justify-center items-center transition-all duration-500 opacity-100 pointer-events-auto px-4">
        <div
            class="mt-16 w-full max-w-2xl min-h-[300px] p-8 md:p-12 bg-white dark:bg-gray-800 rounded-3xl shadow-2xl border border-gray-200 dark:border-gray-700 flex flex-col justify-center items-center text-center">
            <svg class="w-20 h-20 mb-6 text-blue-500 animate-pulse" fill="none" stroke="currentColor"
                viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                    d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <h2 class="text-3xl md:text-4xl font-bold text-gray-900 dark:text-white mb-4">Игра ещё не начата!</h2>
            <p class="text-lg text-gray-500 dark:text-gray-400 mb-8 max-w-lg">
                Ожидайте начала игры от организаторов.
            </p>
            <div id="overlay-buttons" class="flex flex-wrap justify-center gap-4 w-full">
            </div>
        </div>
    </div>


    <main
        class="flex-grow max-w-7xl mx-auto w-full p-4 lg:p-8 flex flex-col lg:flex-row items-start gap-6 relative z-10">
        <div id="question-container" class="w-full lg:w-2/3 mx-auto">
            <div
                class="bg-white dark:bg-gray-800 rounded-3xl shadow-md border border-gray-200 dark:border-gray-700 p-6 md:p-8">
                <div id="question-header"
                    class="flex justify-between items-center mb-4 text-sm text-gray-500 dark:text-gray-400">
                    <span id="question-index">Вопрос 1</span>
                    <span id="question-timer"></span>
                </div>

                <h2 id="question-text" class="text-2xl font-semibold mb-6">
                    Загрузка вопроса...
                </h2>

                <div id="answers" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Ответы будут подставляться из JS -->
                </div>
            </div>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script>
        const htmlEl = document.documentElement;
        const themeBtn = document.getElementById('theme-toggle');

        themeBtn.addEventListener('click', () => {
            htmlEl.classList.toggle('dark');
            localStorage.theme = htmlEl.classList.contains('dark') ? 'dark' : 'light';
        });



        async function copyTag() {
            const tagElement = document.getElementById('hashtag-text');
            const originalText = '#MathJackbox';

            try {
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(originalText);
                } else {
                    const textArea = document.createElement("textarea");
                    textArea.value = originalText;
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);
                }

                tagElement.classList.remove('gradient-tag');
                tagElement.classList.add('text-green-500', 'font-bold');
                tagElement.innerText = '✓ Скопировано!';

                setTimeout(() => {
                    tagElement.classList.remove('text-green-500', 'font-bold');
                    tagElement.classList.add('gradient-tag');
                    tagElement.innerText = originalText;
                }, 2000);

            } catch (err) {
                console.error('Ошибка копирования:', err);
            }
        }

        let isGameAvailable = false;
        let questionsData = null;
        let questionIndex = 0;

        async function fetchGameData() {
            try {
                const data = { available: true, game: null };

                isGameAvailable = data.available;
                const overlay = document.getElementById('game-overlay');

                if (isGameAvailable) {
                    overlay.classList.remove('opacity-100', 'pointer-events-auto');
                    overlay.classList.add('opacity-0', 'pointer-events-none');

                    if (!questionsData) {
                        await loadQuestionsFromJson();
                        loadQuestion();
                    }
                } else {
                    overlay.classList.remove('opacity-0', 'pointer-events-none');
                    overlay.classList.add('opacity-100', 'pointer-events-auto');
                }
            } catch (error) {
                console.error("Ошибка получения данных игры:", error);
            }
        }

        setInterval(fetchGameData, 1000);
        fetchGameData();



        const questionTextEl = document.getElementById('question-text');
        const questionIndexEl = document.getElementById('question-index');
        const questionTimerEl = document.getElementById('question-timer');
        const answersEl = document.getElementById('answers');

        let currentQuestion = null;
        let currentQuestionId = null;
        let isAnswerSent = false;
        let timerIntervalId = null;
        let timeLeft = 0;
        let selectedOptionId = null;


        async function loadQuestionsFromJson() {
            try {
                const resp = await fetch('current-question.json', {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                });

                if (!resp.ok) {
                    console.error('Ошибка загрузки questions.json', resp.status);
                    return;
                }

                const data = await resp.json();

                if (!data || !Array.isArray(data.questions) || data.questions.length === 0) {
                    console.error('Пустой список вопросов в questions.json');
                    return;
                }

                questionsData = data.questions;
            } catch (err) {
                console.error('Ошибка загрузки questions.json:', err);
            }
        }

        async function loadQuestion() {
            try {
                if (!questionsData) {
                    console.error('Вопросы ещё не загружены');
                    return;
                }
                const data = questionsData[questionIndex];

                if (!data || !data.question_id) {
                    questionTextEl.textContent = 'Вопросы закончились';
                    answersEl.innerHTML = '';
                    questionTimerEl.textContent = '';
                    return;
                }

                currentQuestionId = data.question_id;
                currentQuestion = data;
                isAnswerSent = false;
                selectedOptionId = null;

                if (timerIntervalId) {
                    clearInterval(timerIntervalId);
                    timerIntervalId = null;
                }

                questionIndexEl.textContent = `Вопрос ${data.index}`;
                questionTextEl.textContent = data.text;
                timeLeft = data.time_left ?? 0;
                questionTimerEl.textContent = `00:${String(data.time_left).padStart(2, '0')}`;

                // 4 кнопки
                answersEl.innerHTML = '';
                data.options.forEach(option => {
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.textContent = option.text;
                    btn.className =
                        'w-full py-3 px-4 rounded-xl border border-gray-200 dark:border-gray-700 ' +
                        'bg-gray-50 dark:bg-gray-700 hover:bg-blue-50 dark:hover:bg-blue-900/40 ' +
                        'text-left transition flex items-center gap-3';
                    btn.dataset.optionId = option.id;
                    btn.onclick = () => handleAnswerClick(option.id, btn);

                    answersEl.appendChild(btn);
                });

                timerIntervalId = setInterval(() => {
                    if (timeLeft <= 0) {
                        clearInterval(timerIntervalId);
                        timerIntervalId = null;
                        onTimeExpired();
                        return;
                    }
                    timeLeft -= 1;
                    questionTimerEl.textContent = `00:${String(timeLeft).padStart(2, '0')}`
                }, 1000);
            } catch (err) {
                console.error('Ошибка загрузки вопроса:', err);
            }
        }

        function onTimeExpired() {
            const buttons = answersEl.querySelectorAll('button');

            buttons.forEach(b => {
                const id = b.dataset.optionId;

                if (id === currentQuestion.correct_option_id) {
                    b.classList.remove('border-blue-500', 'bg-blue-50', 'dark:bg-blue-900/40');
                    b.classList.add('border-green-500', 'bg-green-50', 'dark:border-green-900/40', 'dark:bg-green-900/40');
                }

                if (selectedOptionId && id === selectedOptionId && id !== currentQuestion.correct_option_id) {
                    b.classList.remove('border-blue-500', 'bg-blue-50', 'dark:bg-blue-900/40');
                    b.classList.add('border-red-500', 'bg-red-50', 'dark:border-red-500', 'dark:bg-red-4267');
                }

                b.disabled = true;
                b.classList.add('opacity-70', 'cursor-not-allowed');
            });

            setTimeout(() => {
                questionIndex += 1;
                loadQuestion();
            }, 2000);
        }



        //удалить при появлении бэка
        const originalFetch = window.fetch;
        window.fetch = async (input, init = {}) => {
            const url = typeof input === 'string' ? input : input.url;
            if (url === '/api/answer' && init && init.method === 'POST') {
                const body = JSON.parse(init.body || '{}');
                const isCorrect = body.option_id === (currentQuestion?.correct_option_id ?? 'b');

                const mockResponse = {
                    ok: true,
                    correct: isCorrect,
                    time_left: currentQuestion ? currentQuestion.time_left - 1 : 19
                };

                return new Response(JSON.stringify(mockResponse), {
                    status: 200,
                    headers: { 'Content-Type': 'application/json' }
                });
            }
            // остальные запросы идут как обычно
            return originalFetch(input, init);
        };



        async function handleAnswerClick(optionId, btnEl) {
            if (!currentQuestionId || isAnswerSent) return;
            isAnswerSent = true;
            selectedOptionId = optionId;
            const isCorrect = optionId === currentQuestion.correct_option_id;

            // Визуально подсветить выбранный ответ
            const buttons = answersEl.querySelectorAll('button');
            buttons.forEach(b => {
                b.disabled = true;
                b.classList.add('opacity-70', 'cursor-not-allowed');
            });
            btnEl.classList.add('border-blue-500', 'bg-blue-50', 'dark:bg-blue-900/40');

            try {
                const resp = await fetch('/api/answer', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        question_id: currentQuestionId,
                        option_id: optionId
                    })
                });

                if (!resp.ok) {
                    console.error('Ошибка отправки ответа', resp.status);
                    return;
                }

                const data = await resp.json();
                console.log('Ответ принят:', data);
            } catch (err) {
                console.error('Ошибка при отправке ответа:', err);
            }

            buttons.forEach(b => {
                if (b.dataset.optionId === selectedOptionId) {
                    b.classList.add('border-pink-500', 'bg-pink-50', 'dark:border-pink-900/40', 'dark:bg-pink-900/40');
                }
            });
        }
    </script>
</body>

</html>
