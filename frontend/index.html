<!DOCTYPE html>
<html lang="ru" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="Математический джебокс">
    <meta property="og:description" content="Играйте с друзьями, узнайте кто лучший математик #МатематическийДжебокс">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://mathjackbox.night.ru">
    <meta property="og:image" content="https://mathjackbox.night.ru/preview.jpg">

    <title>MATH JACKBOX</title>
    
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#2563eb' }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="./style/styles.css">
    
    <style>
        .in-check {
            background-color: rgba(239, 68, 68, 0.6) !important;
            box-shadow: inset 0 0 15px rgba(239, 68, 68, 0.9) !important;
        }
    </style>
</head>

<body class="bg-gray-100 text-gray-900 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-300 min-h-screen flex flex-col font-sans">
    
    <nav class="relative z-50 bg-white dark:bg-gray-800 shadow-md py-4 transition-colors duration-300">
        <div class="max-w-7xl mx-auto w-full px-4 lg:px-8 flex justify-between items-center">
            <div class="flex items-center gap-4">
                
                <button onclick="copyTag()" class="text-left group p-2 -ml-2 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700/50 transition-colors duration-200 select-none cursor-pointer" title="Нажмите, чтобы скопировать тег">
                    <h1 class="font-bold text-xl tracking-wide group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">MATH JACKBOX</h1>
                    <p id="hashtag-text" class="text-sm gradient-tag tracking-wider transition-all duration-300">#MathJackbox</p>
                </button>
            </div>
            <button id="theme-toggle" class="p-2 rounded-lg bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 transition">
                <svg id="theme-icon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
            </button>
        </div>
    </nav>

    <div id="game-overlay" class="fixed inset-0 z-40 bg-white/60 dark:bg-gray-900/70 backdrop-blur-xl flex flex-col justify-center items-center transition-all duration-500 opacity-100 pointer-events-auto px-4">
        <div class="mt-16 w-full max-w-2xl min-h-[300px] p-8 md:p-12 bg-white dark:bg-gray-800 rounded-3xl shadow-2xl border border-gray-200 dark:border-gray-700 flex flex-col justify-center items-center text-center">
            <svg class="w-20 h-20 mb-6 text-blue-500 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <h2 class="text-3xl md:text-4xl font-bold text-gray-900 dark:text-white mb-4">Игра ещё не начата!</h2>
            <p class="text-lg text-gray-500 dark:text-gray-400 mb-8 max-w-lg">
                Ожидайте начала игры от организаторов.
            </p>
            <div id="overlay-buttons" class="flex flex-wrap justify-center gap-4 w-full">
            </div>
        </div>
    </div>

    
    <main class="flex-grow max-w-7xl mx-auto w-full p-4 lg:p-8 flex flex-col lg:flex-row items-start gap-6 relative z-10">        
        
    </main>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script>
        const htmlEl = document.documentElement;
        const themeBtn = document.getElementById('theme-toggle');

        themeBtn.addEventListener('click', () => {
            htmlEl.classList.toggle('dark');
            localStorage.theme = htmlEl.classList.contains('dark') ? 'dark' : 'light';
        });
    


        async function copyTag() {
            const tagElement = document.getElementById('hashtag-text');
            const originalText = '#ОмскШахматнаяСтолица';
            
            try {
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(originalText);
                } else {
                    const textArea = document.createElement("textarea");
                    textArea.value = originalText;
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);
                }

                tagElement.classList.remove('gradient-tag');
                tagElement.classList.add('text-green-500', 'font-bold');
                tagElement.innerText = '✓ Скопировано!';

                setTimeout(() => {
                    tagElement.classList.remove('text-green-500', 'font-bold');
                    tagElement.classList.add('gradient-tag');
                    tagElement.innerText = originalText;
                }, 2000);

            } catch (err) {
                console.error('Ошибка копирования:', err);
            }
        }

        let isGameAvailable = false;

        async function fetchGameData() {
            try {
                const data = { available: true, game: null }; 

                isGameAvailable = data.available;
                const overlay = document.getElementById('game-overlay');

                if (isGameAvailable) {
                    overlay.classList.remove('opacity-100', 'pointer-events-auto');
                    overlay.classList.add('opacity-0', 'pointer-events-none');
                } else {
                    overlay.classList.remove('opacity-0', 'pointer-events-none');
                    overlay.classList.add('opacity-100', 'pointer-events-auto');
                }
            } catch (error) {
                console.error("Ошибка получения данных игры:", error);
            }
        }

        setInterval(fetchGameData, 2000);
        fetchGameData();
    </script>
</body>
</html>
